<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaTeX Converter</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1><button id="bannerBtn" class="banner-btn" title="Go to top">∑ LaTeX Converter</button></h1>
      <p>For all math lovers out there.</p>
    </header>

    <section class="controls card">
      <button id="homeBtn">Home</button>
      <button id="sampleBtn">Sample</button>
      <button id="clearBtn">Clear</button>
      <label><input type="checkbox" id="displayMode" checked /> Display mode</label>
      <label><input type="checkbox" id="autoRender" checked /> Auto render</label>
      <button id="renderBtn">Render</button>
      <button id="copyBtn">Copy Output</button>
    </section>

    <section class="grid">
      <article class="card">
        <h2>LaTeX Input</h2>
        <textarea id="input" placeholder="e.g. \\int_0^1 x^2 \\, dx = \\frac{1}{3}"></textarea>
      </article>

      <article class="card">
        <h2>Output</h2>
        <div id="output" class="output">Rendered output will appear here.</div>
        <p id="error" class="error"></p>
      </article>
    </section>

    <footer>
      <small>© 2026 • <a href="https://github.com/ek-mc/latex-converter" target="_blank" rel="noopener">GitHub</a></small>
    </footer>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script defer src="script.js"></script>
</body>
</html>
